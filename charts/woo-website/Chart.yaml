apiVersion: v2
name: woo-website
description: A Helm chart for the Skeleton Gatsby Application

# A chart can be either an 'application' or a 'library' chart.
#
# Application charts are a collection of templates that can be packaged into versioned archives
# to be deployed.
#
# Library charts provide useful utilities or functions for the chart developer. They're included as
# a dependency of application charts to inject those utilities and functions into the rendering
# pipeline. Library charts do not define any templates and therefore cannot be deployed.
type: application

# Chart-version: bump bij elke chart-wijziging (semver).
# 1.1.0 — platform-grade hardening: securityContext, resources.limits,
# dedicated SA, expliciete probes, pinned image bases (zie pwa/Dockerfile).
version: 1.1.0

# AppVersion: image-versie van de PWA. Sync met de image-tag die in CI gebouwd
# en gepusht wordt. Default in values.yaml is nog `latest` (drift-bron) — wordt
# pas weg als CI semver-tags publiceert.
appVersion: "1.0.0"

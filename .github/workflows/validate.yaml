---
# Validate workflow: yamllint, schema-render, security scans.
# Runs on every PR + push to main/development. Alle jobs blocking, behalve
# trivy-config-warn (informative — surfaces MEDIUM/LOW als context).
name: Validate

on:
  push:
    branches:
      - main
      - development
  pull_request:

permissions:
  contents: read
  pull-requests: read
  security-events: write   # voor trivy SARIF upload

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  yamllint:
    name: yamllint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          config_file: .yamllint.yaml

  validate-values:
    name: validate-values (tenant fields + filename)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
      - name: validate-values.sh
        run: ./react-platform/scripts/validate-values.sh

  smoke-checks:
    name: smoke-checks (helm template + kubeconform)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: latest
      - name: Install yq + kubeconform
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          curl -fsSL \
            https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            | tar xz
          sudo mv kubeconform /usr/local/bin/
      - name: smoke-checks.sh
        run: ./react-platform/scripts/smoke-checks.sh

  trivy-config:
    name: trivy config (chart + manifests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy config scan — vendored chart
        uses: aquasecurity/trivy-action@0.32.0
        with:
          scan-type: config
          scan-ref: charts/woo-website
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true
          format: table
      - name: Trivy config scan — argo + values
        uses: aquasecurity/trivy-action@0.32.0
        with:
          scan-type: config
          scan-ref: react-platform
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true
          format: table

  trivy-fs-secrets:
    name: trivy fs (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan — secrets
        uses: aquasecurity/trivy-action@0.32.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: secret
          exit-code: '1'
          format: table

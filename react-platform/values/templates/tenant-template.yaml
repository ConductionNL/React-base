---
# Per-tenant config — copy this file to ../tenants/tenant-<name>-<env>.yaml,
# edit the two required fields, commit, push. ApplicationSet picks it up
# automatically.
#
# Filename-conventie: tenant-<name>-<env>.yaml. Uniek per (org, env),
# zodat een organisatie zowel een accept- als een prod-tenant kan hebben.
#
# Required:
#   tenant.name        — short slug (e.g. "almere", "test-mcc"). Lowercase,
#                        digits, hyphens. No environment suffix.
#   tenant.environment — "accept" or "prod".
#
# Everything else is derived:
#   • Argo Application name = "<name>-<environment>-reactfront"
#   • Namespace             = "<name>-<environment>" (paired with Nextcloud
#                             co-tenant — namespace must already exist)
#   • Hostname              = <name>.openwoo.app  (prod)
#                             <name>.accept.openwoo.app  (accept)
#   • Upstream API host     = <name>.commonground.nu  (prod)
#                             <name>.accept.commonground.nu  (accept)
#   • Upstream base URL     = https://<upstream-host>/apps/opencatalogi/api
#   • TLS cert              = issued by cert-manager (HTTP-01)
#   • DNS record            = managed by cluster-infra/external-dns
#
# Set optional overrides only if your tenant differs from the defaults.

tenant:
  name: example
  environment: accept

  # ---------- Optional overrides ----------

  # Sync wave — controls rollout order (0 = canary, 1+ = waves).
  # Default: "1"
  # wave: "0"

  # Override the computed hostname (rare — only if tenant uses a non-standard domain).
  # hostname: example.alt-domain.org

  # Override the computed upstream API URL (rare — only if backend lives elsewhere).
  # apiBaseUrl: https://api.example.org/apps/opencatalogi/api

  # Per-tenant branding. All keys are optional. Anything you set lands in
  # the pod's environment as the named GATSBY_*/NL_DESIGN_* variable.
  branding:
    organisationName: ""              # GATSBY_ORGANISATION_NAME — visible in header
    themeClassname: ""                # NL_DESIGN_THEME_CLASSNAME — e.g. "almere-theme"
    jumbotronImageUrl: ""             # GATSBY_JUMBOTRON_IMAGE_URL
    faviconUrl: ""                    # GATSBY_FAVICON_URL — http(s) URL or data:image/...
    footerHideLogo: false             # GATSBY_FOOTER_HIDE_LOGO

  # Extra free-form environment variables passed straight to the pod.
  # Use this for anything not covered by `branding` above.
  # env:
  #   GATSBY_SOMETHING_ELSE: "value"

# ---------- Image override (alleen voor migratie van bestaande tenants) ----
# Bij de cut-over van een toolchain-managed tenant naar deze ApplicationSet
# behoudt de tenant zijn huidige image-tag (`:latest`) zodat namespace-move
# en image-upgrade niet samen plaatsvinden. Verwijder dit blok in een
# aparte sync window om de tenant naar de platform-default te tillen.
# Nieuwe tenants laten dit blok weg (gebruiken common.yaml pin).
#
# pwa:
#   image:
#     tag: latest

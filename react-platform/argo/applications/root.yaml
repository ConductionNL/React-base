---
# Root App-of-Apps Application for the react-platform.
#
# Eenmalig handmatig deployen (zie ../../docs/BOOTSTRAP.md). Daarna beheert
# Argo zichzelf: AppProject, ApplicationSet, en — recursief — deze root
# Application zelf, allemaal vanuit react-platform/argo/.
#
# Tenant-Applications worden niet door deze root gemaakt — daarvoor staat
# de ApplicationSet `react-tenants` in de loop, die op tenant-*.yaml watcht.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: react-platform
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: react-platform
    react.platform/component: root
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  # Project default: bootstrap kan niet afhangen van de AppProject die
  # hijzelf gaat aanmaken. Eens deployed kan dit niet schoner zonder
  # twee-Project-bootstrap; default is acceptabel voor één meta-Application.
  project: default

  source:
    repoURL: https://codeberg.org/Conduction/React-base.git
    # On main: the app-of-apps tracks HEAD (default branch). NB — moving to a
    # new revision needs a ONE-TIME live patch of this Application's
    # targetRevision, because it reads its own revision from the old one
    # (classic app-of-apps bootstrap). After that it self-heals on main.
    targetRevision: HEAD
    # Recursief alles in argo/ syncen: projects/, applicationsets/, en
    # applications/root.yaml zelf (self-management). Argo handelt circulaire
    # self-references netjes af.
    path: react-platform/argo
    directory:
      recurse: true

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m

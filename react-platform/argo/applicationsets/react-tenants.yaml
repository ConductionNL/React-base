---
# ApplicationSet that generates one Argo CD Application per Nextcloud tenant.
#
# SOURCE OF TRUTH: Nextcloud-base's `nextcloud-platform/values/tenants/`.
# This platform owns no per-tenant files — "Argo ís de watcher": the git
# generator below watches the Nextcloud-base tenant directory and materialises
# one WOO PWA frontend per tenant. Adding a Nextcloud tenant => Argo creates
# the co-tenant frontend automatically. Zero drift (the frontend fleet is a
# pure function of the Nextcloud tenant fleet), no bespoke sync process.
#
# Per-tenant frontend config (image tag, branding, enable/disable, host
# override) lives in an OPTIONAL `tenant.frontend:` block in the Nextcloud
# tenant file. Absent block => default behaviour (opt-out model).
#
# Nextcloud `tenant.name` already encodes the environment (e.g. `almere-accept`),
# so it maps 1:1 to the namespace and the `<name>-reactfront` Application name.
# The bare org (`almere`) is derived for the public hostname only.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: react-tenants
  namespace: argocd
  annotations:
    argocd.argoproj.io/compare-options: IgnoreExtraneous
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=default"]

  # Don't auto-delete tenant Applications when their tenant-*.yaml is removed
  # (manual cleanup forces operator review).
  syncPolicy:
    preserveResourcesOnDeletion: true

  generators:
    - git:
        # Source of truth = Nextcloud-base (lowercase `conduction` — Argo
        # matches repo URLs exactly; this is the URL the Nextcloud appset uses).
        repoURL: "https://codeberg.org/conduction/Nextcloud-base.git"
        revision: HEAD
        files:
          # FASE 2 (2026-07-06, akkoord mwest): elk Nextcloud-tenant-file levert
          # automatisch een frontend — onboarding is één stap (tenant file
          # aanmaken), er is geen allowlist meer. De historische per-batch
          # allowlist (zie git-historie van dit bestand) is overbodig geworden:
          # sinds 2026-06-30 dekt het wildcard-cert (*.openwoo.app +
          # *.accept.openwoo.app) alle afgeleide hosts (nul LE-issuance), en
          # geen enkele resterende legacy Helm-app heeft nog een tenant file
          # (gecheckt 2026-07-06), dus naam-collisions zijn uitgesloten.
          - path: "nextcloud-platform/values/tenants/tenant-*.yaml"
      # Opt-out i.p.v. allowlist: tenants die GEEN WOO-portaal zijn, zetten
      # `tenant.frontend.enabled: false` in hun eigen tenant file (2026-07-06:
      # vng-backend-*, softwarecatalogus-*, pipelinq-server-prod). De
      # post-selector matcht op de geflattende params (dotted keys; geverifieerd
      # in argo-cd v3.0.6 generator_spec_processor.go); een ontbrekende key
      # matcht NotIn, dus tenants zonder frontend-blok doen gewoon mee.
      # *-migrate-* tenants doen sinds FASE 2 bewust WEL mee: tijdelijke
      # omgevingen krijgen hun eigen <org>-migrate.<env>.openwoo.app preview
      # (besluit mwest 2026-07-06 — vervangt de exclusie-POLICY van 2026-06-30).
      selector:
        matchExpressions:
          - key: tenant.frontend.enabled
            operator: NotIn
            values:
              - "false"

  template:
    metadata:
      # Application name == Nextcloud tenant name + "-reactfront", which equals
      # today's create_react.sh / mcc output exactly (e.g. almere-accept-reactfront)
      # so cut-over per tenant is "delete old, ApplicationSet creates same name".
      name: "{{ .tenant.name }}-reactfront"
      namespace: argocd
      labels:
        app.kubernetes.io/part-of: react-platform
        react.platform/tenant: "{{ .tenant.name }}"
        react.platform/environment: "{{ .tenant.environment }}"
      annotations:
        argocd.argoproj.io/sync-wave: "{{ default \"1\" .tenant.wave }}"
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: react-platform

      sources:
        # Vendored woo-website chart in this repo (React-base).
        - repoURL: "https://codeberg.org/Conduction/React-base.git"
          # On main: chart-/values-source tracks HEAD; the generator
          # (Nextcloud-base) also tracks HEAD. Canary gating is the generator
          # glob (tenant-canary-*.yaml), not the revision.
          targetRevision: HEAD
          path: charts/woo-website
          helm:
            releaseName: "woo-website"
            valueFiles:
              - "$values/react-platform/values/common.yaml"
              - "$values/react-platform/values/env/{{ .tenant.environment }}.yaml"
            # Inline values: derived hostname, upstream URL, TLS secret name,
            # image-tag override, branding env, common labels for NetworkPolicy.
            values: |
              {{- $ncname := .tenant.name -}}
              {{- $env := .tenant.environment -}}
              {{- /* Nextcloud name encodes env (almere-accept); strip it for the public org host. */ -}}
              {{- $org := trimSuffix (printf "-%s" $env) $ncname -}}
              {{- $fe := default (dict) .tenant.frontend -}}
              {{- $branding := default (dict) (index $fe "branding") -}}
              {{- /* NL Design theme classname. Baseline default "conduction-theme" (it exists in
                     the bundled themes, so it renders out of the box). DEVS adjust this LIVE in
                     Argo per gemeente — the GATSBY_ and NL_DESIGN_ env is ignore-diffed (see
                     ignoreDifferences + RespectIgnoreDifferences below), so this git value is only
                     the initial baseline. frontend.branding.themeClassname overrides the baseline. */ -}}
              {{- $theme := default "conduction-theme" (index $branding "themeClassname") -}}
              {{- $extraEnv := default (dict) (index $fe "env") -}}
              {{- $tag := index $fe "tag" -}}
              {{- /* Per-tenant TLS override for custom-domain frontends (NOT covered by the
                     *.openwoo.app wildcard). Default = wildcard-openwoo-tls, no issuer annotation.
                     Set frontend.tls.secretName + frontend.tls.issuer:
                       issuer "none"  = BYO / pre-seeded secret (no annotation, no issuance);
                       any other value = cert-manager cluster-issuer (e.g. letsencrypt-prod,
                                         HTTP-01) → per-host cert. Pair with frontend.host. */ -}}
              {{- $tls := default (dict) (index $fe "tls") -}}
              {{- $tlsSecret := default "wildcard-openwoo-tls" (index $tls "secretName") -}}
              {{- $tlsIssuer := default "" (index $tls "issuer") -}}
              {{- /* frontend.extraHosts: extra publieke hosts naast de primaire (bijv.
                     open.gooisemeren.nl naast gooisemeren.openwoo.app). Ze delen het ENE
                     tls-block/secret hieronder — met een issuer geeft cert-manager dus één
                     multi-SAN cert uit. Leeg = exact dezelfde output als voorheen. */ -}}
              {{- $extraHosts := default (list) (index $fe "extraHosts") -}}
              {{- $domainSuffix := "" -}}
              {{- $upstreamSuffix := "" -}}
              {{- if eq $env "prod" -}}
              {{- $domainSuffix = "openwoo.app" -}}
              {{- $upstreamSuffix = "commonground.nu" -}}
              {{- else -}}
              {{- $domainSuffix = printf "%s.openwoo.app" $env -}}
              {{- $upstreamSuffix = printf "%s.commonground.nu" $env -}}
              {{- end -}}
              {{- $computedHost := printf "%s.%s" $org $domainSuffix -}}
              {{- $host := default $computedHost (index $fe "host") -}}
              {{- $upstreamHost := printf "%s.%s" $org $upstreamSuffix -}}
              {{- /* External-domain tenants declare tenant.hostname (the Nextcloud backend host); the frontend's upstream follows it so the two never drift. Explicit frontend.upstreamHost overrides both. */ -}}
              {{- $upstreamHost = default $upstreamHost .tenant.hostname -}}
              {{- $upstreamHost = default $upstreamHost (index $fe "upstreamHost") -}}
              {{- $upstreamBase := printf "https://%s/apps/opencatalogi/api" $upstreamHost -}}
              {{- $apiBase := default $upstreamBase (index $fe "apiBaseUrl") -}}
              commonLabels:
                app.kubernetes.io/part-of: react-platform
                react.platform/tenant: "{{ $ncname }}"
                react.platform/environment: "{{ $env }}"
              global:
                domain: "{{ $host }}"
                # tls: false — anders maakt de chart een eigen extra
                # TLS-block + cert (`woo-website-frontend-tls`) bovenop
                # onze `ingress.tls` met de `<name>-tls` convention.
                # Resultaat: 2 certs, dubbele issuance bij Let's Encrypt.
                # Wij leveren cert-manager.io/cluster-issuer zelf via
                # ingress.annotations hieronder.
                tls: false
              pwa:
                {{- with $tag }}
                # Per-tenant image-pin (tenant.frontend.tag). Lost de "iffy tags"
                # tijdens migratie op: migreer op de huidige tag, bump later bewust.
                image:
                  tag: "{{ . }}"
                {{- end }}
                upstream:
                  host: "{{ $upstreamHost }}"
                  base: "{{ $apiBase }}"
                env:
                  {{- with index $branding "organisationName" }}
                  GATSBY_ORGANISATION_NAME: "{{ . }}"
                  {{- end }}
                  # NL Design theme — ALWAYS emitted; baseline conduction-theme, dev-editable LIVE (ignore-diff).
                  # Key MUST be GATSBY_-prefixed: the Gatsby app only reads GATSBY_NL_DESIGN_THEME_CLASSNAME
                  # client-side (verified in the JS bundle). The un-prefixed key is ignored by the app.
                  GATSBY_NL_DESIGN_THEME_CLASSNAME: "{{ $theme }}"
                  {{- with index $branding "jumbotronImageUrl" }}
                  GATSBY_JUMBOTRON_IMAGE_URL: "{{ . }}"
                  {{- end }}
                  {{- with index $branding "faviconUrl" }}
                  GATSBY_FAVICON_URL: "{{ . }}"
                  {{- end }}
                  {{- if index $branding "footerHideLogo" }}
                  GATSBY_FOOTER_HIDE_LOGO: "{{ index $branding "footerHideLogo" }}"
                  {{- end }}
                  {{- range $k, $v := $extraEnv }}
                  {{ $k }}: "{{ $v }}"
                  {{- end }}
              ingress:
                # TLS: default = shared wildcard (wildcard-openwoo-tls, reflected into this
                # namespace by reflector; NO issuer annotation → zero per-tenant issuance).
                # Custom-domain tenants (not under *.openwoo.app) set frontend.tls to get their
                # own cert: issuer != "none" adds cert-manager.io/cluster-issuer for a per-host
                # cert; issuer "none" references a pre-seeded/BYO secret with no annotation.
                {{- if and $tlsIssuer (ne $tlsIssuer "none") }}
                annotations:
                  cert-manager.io/cluster-issuer: "{{ $tlsIssuer }}"
                {{- end }}
                # Geen `hosts:`-entry voor de primaire host — de chart maakt al een rule
                # op `global.domain`; een tweede via `ingress.hosts` zou dubbel zijn.
                # Alleen frontend.extraHosts komen hier als extra rules bij.
                {{- with $extraHosts }}
                hosts:
                  {{- range . }}
                  - host: "{{ . }}"
                    paths:
                      - path: /
                        pathType: ImplementationSpecific
                  {{- end }}
                {{- end }}
                tls:
                  - secretName: "{{ $tlsSecret }}"
                    hosts:
                      - "{{ $host }}"
                      {{- range $extraHosts }}
                      - "{{ . }}"
                      {{- end }}

        # Values repo (this repo, React-base) — anchors $values references above.
        - repoURL: "https://codeberg.org/Conduction/React-base.git"
          targetRevision: HEAD
          ref: values

      destination:
        server: https://kubernetes.default.svc
        # Co-tenant namespace == the Nextcloud namespace (== tenant.name, e.g.
        # almere-accept). Created by the Nextcloud-base ApplicationSet; must exist.
        namespace: "{{ .tenant.name }}"

      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: false
        syncOptions:
          - PrunePropagationPolicy=foreground
          - PruneLast=true
          # Honour ignoreDifferences during sync too — so a sync does NOT clobber the
          # branding/theme env that devs edit live in Argo (see ignoreDifferences).
          - RespectIgnoreDifferences=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m

      revisionHistoryLimit: 10

      ignoreDifferences:
        - group: apps
          kind: Deployment
          jsonPointers:
            - /spec/replicas
          # Branding/theme env (GATSBY_*, NL_DESIGN_*) is DEV-EDITABLE LIVE in Argo —
          # deliberately NOT GitOps. selfHeal won't revert it, and (with
          # RespectIgnoreDifferences) a sync won't clobber it. UPSTREAM_HOST/UPSTREAM_BASE
          # are NOT matched, so they stay git-managed. Trade-off: live edits are
          # unaudited, unreviewed, and lost if the Deployment is recreated.
          jqPathExpressions:
            - '.spec.template.spec.containers[].env[] | select(.name | test("^(GATSBY_|NL_DESIGN_)"))'
            # Container image (registry+tag) is DEV-EDITABLE LIVE in Argo too (self-service
            # tag bumps without a git push). frontend.tag in the tenant file is then only the
            # INITIAL value on a fresh deploy; live edits stick and are not reverted.
            - '.spec.template.spec.containers[].image'
        - group: autoscaling
          kind: HorizontalPodAutoscaler
          jsonPointers:
            - /status

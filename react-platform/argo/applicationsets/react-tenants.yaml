---
# ApplicationSet that generates one Argo CD Application per Nextcloud tenant.
#
# SOURCE OF TRUTH: Nextcloud-base's `nextcloud-platform/values/tenants/`.
# This platform owns no per-tenant files — "Argo ís de watcher": the git
# generator below watches the Nextcloud-base tenant directory and materialises
# one WOO PWA frontend per tenant. Adding a Nextcloud tenant => Argo creates
# the co-tenant frontend automatically. Zero drift (the frontend fleet is a
# pure function of the Nextcloud tenant fleet), no bespoke sync process.
#
# Per-tenant frontend config (image tag, branding, enable/disable, host
# override) lives in an OPTIONAL `tenant.frontend:` block in the Nextcloud
# tenant file. Absent block => default behaviour (opt-out model).
#
# Nextcloud `tenant.name` already encodes the environment (e.g. `almere-accept`),
# so it maps 1:1 to the namespace and the `<name>-reactfront` Application name.
# The bare org (`almere`) is derived for the public hostname only.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: react-tenants
  namespace: argocd
  annotations:
    argocd.argoproj.io/compare-options: IgnoreExtraneous
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=default"]

  # Don't auto-delete tenant Applications when their tenant-*.yaml is removed
  # (manual cleanup forces operator review).
  syncPolicy:
    preserveResourcesOnDeletion: true

  generators:
    - git:
        # Source of truth = Nextcloud-base (lowercase `conduction` — Argo
        # matches repo URLs exactly; this is the URL the Nextcloud appset uses).
        repoURL: "https://codeberg.org/conduction/Nextcloud-base.git"
        revision: HEAD
        files:
          # Staged rollout: one glob per onboarded set so each is an explicit,
          # auditable inclusion (a git-files generator can't filter on a nested
          # field, so the glob list IS the "which tenants have a live frontend"
          # record). FASE 2 end state widens to `tenant-*.yaml`, but that
          # collides by name with the 44 legacy Helm apps — so roll per set per
          # react-platform/docs/MIGRATION.md, never big-bang.
          - path: "nextcloud-platform/values/tenants/tenant-canary-*.yaml"
          # conduction test/demo (backend on test/demo.conduction.nl) — new
          # frontends, no legacy app to cut over.
          - path: "nextcloud-platform/values/tenants/tenant-conduction-*.yaml"
          # Batch-onboarded accept tenants (new backends, no legacy frontend
          # in toolchain/ to cut over — clean adds). Onboarded 2026-06-24.
          - path: "nextcloud-platform/values/tenants/tenant-delft-accept.yaml"
          - path: "nextcloud-platform/values/tenants/tenant-edam-volendam-accept.yaml"
          # --- 2026-06-30: every WOO tenant gets a frontend. These tenants had NO
          #     *-reactfront app (gap computed from the live cluster) so they do NOT
          #     collide with the 44 legacy apps. EXCLUDED on purpose (not WOO portals):
          #     vng-backend-* / softwarecatalogus-* / pipelinq-server-prod. The 21
          #     tenants already on a LEGACY frontend stay there until migrated.
          #
          #     ROLLOUT IS BATCHED (~5/batch) to stay under the Let's Encrypt limit of
          #     50 certs/week per registered domain (openwoo.app): each onboarded
          #     frontend mints one <host>.openwoo.app cert. Release ONE batch (uncomment
          #     its 5 lines), push, confirm the certs issue Ready, then the next batch.
          #     If issuance starts failing ("too many certificates already issued"),
          #     pause until the weekly window rolls — or move to a wildcard cert.
          # --- batch 1 (PRIORITY — live) ---
          - path: "nextcloud-platform/values/tenants/tenant-voorschoten-accept.yaml"
          - path: "nextcloud-platform/values/tenants/tenant-wassenaar-accept.yaml"
          - path: "nextcloud-platform/values/tenants/tenant-ridderkerk-accept.yaml"
          # --- legacy-migratie Tier 1 (cutover van de oude toolchain-frontend) ---
          - path: "nextcloud-platform/values/tenants/tenant-epe-accept.yaml"   # pilot 2026-06-30
          # --- batch 2 (uncomment to release) ---
          #- path: "nextcloud-platform/values/tenants/tenant-acato-accept.yaml"
          #- path: "nextcloud-platform/values/tenants/tenant-alkmaar-accept.yaml"
          #- path: "nextcloud-platform/values/tenants/tenant-barneveld-prod.yaml"
          #- path: "nextcloud-platform/values/tenants/tenant-connext-prod.yaml"
          #- path: "nextcloud-platform/values/tenants/tenant-debilt-accept.yaml"
          # --- batch 3 ---
          #- path: "nextcloud-platform/values/tenants/tenant-debilt-prod.yaml"
          #- path: "nextcloud-platform/values/tenants/tenant-dijkenwaard-prod.yaml"
          #- path: "nextcloud-platform/values/tenants/tenant-docudesk-prod.yaml"
          #- path: "nextcloud-platform/values/tenants/tenant-epe-accept.yaml"
          #- path: "nextcloud-platform/values/tenants/tenant-ermelo-accept.yaml"
          # --- batch 4 ---
          #- path: "nextcloud-platform/values/tenants/tenant-gouda-accept.yaml"
          #- path: "nextcloud-platform/values/tenants/tenant-gouda-prod.yaml"
          #- path: "nextcloud-platform/values/tenants/tenant-harderwijk-accept.yaml"
          #- path: "nextcloud-platform/values/tenants/tenant-helmond-accept.yaml"
          #- path: "nextcloud-platform/values/tenants/tenant-io-accept.yaml"
          # --- batch 5 ---
          #- path: "nextcloud-platform/values/tenants/tenant-leiderdorp-accept.yaml"
          #- path: "nextcloud-platform/values/tenants/tenant-mboraad-prod.yaml"
          #- path: "nextcloud-platform/values/tenants/tenant-meerinzicht-accept.yaml"
          #- path: "nextcloud-platform/values/tenants/tenant-meppel-prod.yaml"
          #- path: "nextcloud-platform/values/tenants/tenant-noordwijk-prod.yaml"
          # --- batch 6 ---
          #- path: "nextcloud-platform/values/tenants/tenant-oegstgeest-accept.yaml"
          #- path: "nextcloud-platform/values/tenants/tenant-opengemeenten-accept.yaml"
          #- path: "nextcloud-platform/values/tenants/tenant-oudeijsselstreek-accept.yaml"
          #- path: "nextcloud-platform/values/tenants/tenant-rijswijk-accept.yaml"
          #- path: "nextcloud-platform/values/tenants/tenant-sloterburg-accept.yaml"
          # --- batch 7 ---
          #- path: "nextcloud-platform/values/tenants/tenant-terneuzen-accept.yaml"
          #- path: "nextcloud-platform/values/tenants/tenant-terneuzen-prod.yaml"
          #- path: "nextcloud-platform/values/tenants/tenant-tilburg-preprod-prod.yaml"
          #- path: "nextcloud-platform/values/tenants/tenant-voorst-prod.yaml"
          #- path: "nextcloud-platform/values/tenants/tenant-zeewolde-accept.yaml"
          # --- batch 8 ---
          #- path: "nextcloud-platform/values/tenants/tenant-zoeterwoude-accept.yaml"
          #- path: "nextcloud-platform/values/tenants/tenant-zwolle-prod.yaml"
          # POLICY: *-migrate-* tenants are TEMPORARY migration backends and do NOT
          # get their own frontend — the canonical tenant's frontend already serves the
          # public host. gooisemeren-migrate-prod was listed here but produced a
          # gooisemeren-migrate-prod-reactfront app that only collided with the
          # canonical gooisemeren frontend and sat Missing; removed 2026-06-30.
          # When FASE 2 widens this to tenant-*.yaml, add an explicit *-migrate-*
          # exclusion — git-files generators have no negative glob, so the wildcard
          # would otherwise re-create these dead frontends.

  template:
    metadata:
      # Application name == Nextcloud tenant name + "-reactfront", which equals
      # today's create_react.sh / mcc output exactly (e.g. almere-accept-reactfront)
      # so cut-over per tenant is "delete old, ApplicationSet creates same name".
      name: "{{ .tenant.name }}-reactfront"
      namespace: argocd
      labels:
        app.kubernetes.io/part-of: react-platform
        react.platform/tenant: "{{ .tenant.name }}"
        react.platform/environment: "{{ .tenant.environment }}"
      annotations:
        argocd.argoproj.io/sync-wave: "{{ default \"1\" .tenant.wave }}"
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: react-platform

      sources:
        # Vendored woo-website chart in this repo (React-base).
        - repoURL: "https://codeberg.org/Conduction/React-base.git"
          # On main: chart-/values-source tracks HEAD; the generator
          # (Nextcloud-base) also tracks HEAD. Canary gating is the generator
          # glob (tenant-canary-*.yaml), not the revision.
          targetRevision: HEAD
          path: charts/woo-website
          helm:
            releaseName: "woo-website"
            valueFiles:
              - "$values/react-platform/values/common.yaml"
              - "$values/react-platform/values/env/{{ .tenant.environment }}.yaml"
            # Inline values: derived hostname, upstream URL, TLS secret name,
            # image-tag override, branding env, common labels for NetworkPolicy.
            values: |
              {{- $ncname := .tenant.name -}}
              {{- $env := .tenant.environment -}}
              {{- /* Nextcloud name encodes env (almere-accept); strip it for the public org host. */ -}}
              {{- $org := trimSuffix (printf "-%s" $env) $ncname -}}
              {{- $fe := default (dict) .tenant.frontend -}}
              {{- $branding := default (dict) (index $fe "branding") -}}
              {{- /* NL Design theme classname. Baseline default "conduction-theme" (it exists in
                     the bundled themes, so it renders out of the box). DEVS adjust this LIVE in
                     Argo per gemeente — the GATSBY_ and NL_DESIGN_ env is ignore-diffed (see
                     ignoreDifferences + RespectIgnoreDifferences below), so this git value is only
                     the initial baseline. frontend.branding.themeClassname overrides the baseline. */ -}}
              {{- $theme := default "conduction-theme" (index $branding "themeClassname") -}}
              {{- $extraEnv := default (dict) (index $fe "env") -}}
              {{- $tag := index $fe "tag" -}}
              {{- $domainSuffix := "" -}}
              {{- $upstreamSuffix := "" -}}
              {{- if eq $env "prod" -}}
              {{- $domainSuffix = "openwoo.app" -}}
              {{- $upstreamSuffix = "commonground.nu" -}}
              {{- else -}}
              {{- $domainSuffix = printf "%s.openwoo.app" $env -}}
              {{- $upstreamSuffix = printf "%s.commonground.nu" $env -}}
              {{- end -}}
              {{- $computedHost := printf "%s.%s" $org $domainSuffix -}}
              {{- $host := default $computedHost (index $fe "host") -}}
              {{- $upstreamHost := printf "%s.%s" $org $upstreamSuffix -}}
              {{- /* External-domain tenants declare tenant.hostname (the Nextcloud backend host); the frontend's upstream follows it so the two never drift. Explicit frontend.upstreamHost overrides both. */ -}}
              {{- $upstreamHost = default $upstreamHost .tenant.hostname -}}
              {{- $upstreamHost = default $upstreamHost (index $fe "upstreamHost") -}}
              {{- $upstreamBase := printf "https://%s/apps/opencatalogi/api" $upstreamHost -}}
              {{- $apiBase := default $upstreamBase (index $fe "apiBaseUrl") -}}
              commonLabels:
                app.kubernetes.io/part-of: react-platform
                react.platform/tenant: "{{ $ncname }}"
                react.platform/environment: "{{ $env }}"
              global:
                domain: "{{ $host }}"
                # tls: false — anders maakt de chart een eigen extra
                # TLS-block + cert (`woo-website-frontend-tls`) bovenop
                # onze `ingress.tls` met de `<name>-tls` convention.
                # Resultaat: 2 certs, dubbele issuance bij Let's Encrypt.
                # Wij leveren cert-manager.io/cluster-issuer zelf via
                # ingress.annotations hieronder.
                tls: false
              pwa:
                {{- with $tag }}
                # Per-tenant image-pin (tenant.frontend.tag). Lost de "iffy tags"
                # tijdens migratie op: migreer op de huidige tag, bump later bewust.
                image:
                  tag: "{{ . }}"
                {{- end }}
                upstream:
                  host: "{{ $upstreamHost }}"
                  base: "{{ $apiBase }}"
                env:
                  {{- with index $branding "organisationName" }}
                  GATSBY_ORGANISATION_NAME: "{{ . }}"
                  {{- end }}
                  # NL Design theme — ALWAYS emitted; baseline conduction-theme, dev-editable LIVE (ignore-diff).
                  # Key MUST be GATSBY_-prefixed: the Gatsby app only reads GATSBY_NL_DESIGN_THEME_CLASSNAME
                  # client-side (verified in the JS bundle). The un-prefixed key is ignored by the app.
                  GATSBY_NL_DESIGN_THEME_CLASSNAME: "{{ $theme }}"
                  {{- with index $branding "jumbotronImageUrl" }}
                  GATSBY_JUMBOTRON_IMAGE_URL: "{{ . }}"
                  {{- end }}
                  {{- with index $branding "faviconUrl" }}
                  GATSBY_FAVICON_URL: "{{ . }}"
                  {{- end }}
                  {{- if index $branding "footerHideLogo" }}
                  GATSBY_FOOTER_HIDE_LOGO: "{{ index $branding "footerHideLogo" }}"
                  {{- end }}
                  {{- range $k, $v := $extraEnv }}
                  {{ $k }}: "{{ $v }}"
                  {{- end }}
              ingress:
                # NO cert-manager annotation: TLS is served from the shared wildcard
                # cert (*.openwoo.app + *.accept.openwoo.app, ClusterIssuer
                # letsencrypt-dns in cluster-infra), reflected into this namespace as
                # `wildcard-openwoo-tls` by reflector. Zero per-tenant LE issuance →
                # no rate-limit pressure. (Requires the wildcard cert issued and
                # reflected into this namespace first; see cluster-infra.)
                # Geen `hosts:` block — de chart maakt al een rule op
                # `global.domain`, dus een tweede via `ingress.hosts` levert
                # een duplicate rule (zichtbaar als `host,host` in
                # `kubectl get ingress`).
                tls:
                  - secretName: "wildcard-openwoo-tls"
                    hosts:
                      - "{{ $host }}"

        # Values repo (this repo, React-base) — anchors $values references above.
        - repoURL: "https://codeberg.org/Conduction/React-base.git"
          targetRevision: HEAD
          ref: values

      destination:
        server: https://kubernetes.default.svc
        # Co-tenant namespace == the Nextcloud namespace (== tenant.name, e.g.
        # almere-accept). Created by the Nextcloud-base ApplicationSet; must exist.
        namespace: "{{ .tenant.name }}"

      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: false
        syncOptions:
          - PrunePropagationPolicy=foreground
          - PruneLast=true
          # Honour ignoreDifferences during sync too — so a sync does NOT clobber the
          # branding/theme env that devs edit live in Argo (see ignoreDifferences).
          - RespectIgnoreDifferences=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m

      revisionHistoryLimit: 10

      ignoreDifferences:
        - group: apps
          kind: Deployment
          jsonPointers:
            - /spec/replicas
          # Branding/theme env (GATSBY_*, NL_DESIGN_*) is DEV-EDITABLE LIVE in Argo —
          # deliberately NOT GitOps. selfHeal won't revert it, and (with
          # RespectIgnoreDifferences) a sync won't clobber it. UPSTREAM_HOST/UPSTREAM_BASE
          # are NOT matched, so they stay git-managed. Trade-off: live edits are
          # unaudited, unreviewed, and lost if the Deployment is recreated.
          jqPathExpressions:
            - '.spec.template.spec.containers[].env[] | select(.name | test("^(GATSBY_|NL_DESIGN_)"))'
        - group: autoscaling
          kind: HorizontalPodAutoscaler
          jsonPointers:
            - /status
